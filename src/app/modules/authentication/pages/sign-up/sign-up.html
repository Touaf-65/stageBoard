<form class="my-10 space-y-6">
  <div class="text-center">
    <h2 class="mb-1 text-3xl font-semibold text-foreground">Bonjour <span class="text-primary">!</span></h2>
    <p class="text-sm text-muted-foreground">Entrer vos informations pour créer votre compte</p>
  </div>

  <div class="space-y-3 text-left">
    <div class="form__group">

      <div class="relative">
        <input type="text" id="email" [ngClass]="{'is__invalid-input':submitted && !email}" class="peer block"
          placeholder="" />
        <label for="email"
          class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          Email address
        </label>
      </div>

      <div *ngIf="submitted && !email" class="is__invalid-error">
        <div *ngIf="!email">Required field</div>
        <div *ngIf="!email">Email must be an email address valid</div>
      </div>
    </div>

    <div class="form__group">

      <div *ngIf="submitted && !password" class="is__invalid-error">
      </div>

      <div class="space-y-3 text-left">
        <div class="relative">
          <input type="password" id="password" class="peer block" placeholder=" " />
          <label for="password"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Mot de passe
          </label>
          <span class="absolute top-2.5 right-5 cursor-pointer text-muted-foreground">
            <svg-icon src="assets/icons/heroicons/outline/eye-off.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
            <svg-icon src="assets/icons/heroicons/outline/eye.svg" [svgClass]="'h-5 w-5 hidden'"> </svg-icon>
          </span>
        </div>
        <div class="grid grid-cols-4 gap-2">
          <div class="h-1 rounded-sm bg-muted"></div>
          <div class="h-1 rounded-sm bg-muted"></div>
          <div class="h-1 rounded-sm bg-muted"></div>
          <div class="h-1 rounded-sm bg-muted"></div>
        </div>
        <span class="text-xs text-muted-foreground">
          Utilisez 8 caractères ou plus avec une combinaison de lettres, de chiffres et de symboles.
        </span>

        <div class="relative">
          <input type="password" class="peer block" id="confirm-password" placeholder=" ">
          <label for="confirm-password"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Confirmer le mot de passe
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="mb-2 flex items-center justify-between space-x-3">
    <div class="flex items-center">
      <input type="checkbox" id="remember-me">
      <label for="remember-me" class="ml-2 block text-sm text-muted-foreground"> Remember me </label>
    </div>
    <app-button routerLink="/authentication/forgot-password" impact="none" tone="primary" shape="rounded" size="small">
      Forgot your password?
    </app-button>
  </div>

  <div>
    <app-button full impact="bold" tone="primary" shape="rounded" size="medium">S'inscrire</app-button>
  </div>


</form>
