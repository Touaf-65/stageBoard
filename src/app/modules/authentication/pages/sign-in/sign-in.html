<app-notifications></app-notifications>
<div class="my-10 space-y-6">
  <div class="text-center mb-8 floating-animation">
    <h2 class="mb-1 text-3xl font-semibold text-foreground">Bonjour <span class="text-primary">!</span></h2>
    <p class="text-sm text-muted-foreground">Entrer vos identifiants pour vous connecter..</p>
  </div>


  <div class="space-y-3 text-left">
    <div class="form__group">
      <div class="relative">
        <input
          type="text"
          id="email"
          [(ngModel)]="email"
          [ngClass]="{'is__invalid-input':submitted && !email}"
          class="peer block"
          placeholder=""
        />
        <label
          for="email"
          class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          Email 
        </label>
      </div>

      <div *ngIf="submitted && !email" class="is__invalid-error">
        <div *ngIf="!email">Champ requis</div>
        <div *ngIf="!email">Email doit être une adresse email valide</div>
      </div>
    </div>

    <div class="form__group">
      <div class="relative">
        <input
          [type]="passwordTextType ? 'text' : 'password'"
          id="password"
          [(ngModel)]="password"
          [ngClass]="{ 'is__invalid-input': submitted && !password }"
          class="peer block"
          placeholder=" "
        />
        <label
          for="password"
          class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          Mot de passe
        </label>
        <span class="absolute top-2.5 right-5 cursor-pointer text-muted-foreground" (click)="togglePasswordTextType()">
          <svg-icon
            [src]="
              !passwordTextType
                ? '/assets/icons/heroicons/outline/eye-off.svg'
                : '/assets/icons/heroicons/outline/eye.svg'
            "
            [svgClass]="'h-5 w-5'">
          </svg-icon>
        </span>
      </div>
      <div *ngIf="submitted && !password" class="is__invalid-error">
      </div>
    </div>
  </div>

  <div class="mb-2 flex items-center justify-between space-x-3">
    <div class="flex items-center">
      <input type="checkbox" id="remember-me">
      <label for="remember-me" class="ml-2 block text-sm text-muted-foreground"> Se souvenir de moi? </label>
    </div>
    <app-button routerLink="/auth/forgot-password" impact="none" tone="primary" shape="rounded" size="small">
      Mot de passe oublié?
    </app-button>
  </div>

  <div>
    <button 
      type="button"
      (click)="login_user()"
      [disabled]="loading"
      class="w-full px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
      <span *ngIf="loading" class="mr-2">
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </span>
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>
  </div>

  <div class="mb-2 flex items-center justify-between space-x-3">

    <h2 class="mb-1"> Pas encore de compte? </h2>

    <app-button routerLink="/auth/sign-up" impact="none" tone="primary" shape="rounded" size="small" class="position-center ml-10">
      Creer un compte
    </app-button>
  </div>

</div>
