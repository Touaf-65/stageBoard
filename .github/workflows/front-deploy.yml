# ============================================================
# [FRONTEND] stageBoard — GitHub Actions CI/CD
# Fichier : .github/workflows/deploy.yml
# ============================================================
#
# Ce workflow se déclenche à chaque push sur main.
# Il build l'image Docker Nginx et la pousse sur Docker Hub.
# Watchtower sur la VM détecte la nouvelle image et redémarre
# le conteneur automatiquement — aucune manipulation sur la VM.
#
# Secrets requis dans GitHub (Settings → Secrets → Actions) :
#   - DOCKERHUB_USERNAME  : ton username Docker Hub
#   - DOCKERHUB_TOKEN     : token généré sur hub.docker.com
# ============================================================

name: "[FRONTEND] Build & Deploy"

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build Docker image & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Activer le cache BuildKit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build + Push (latest + tag SHA pour rollback)
      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stageboard-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stageboard-frontend:${{ github.sha }}

      # 5. Résumé du déploiement
      - name: Deployment summary
        run: |
          echo "Image poussée : ${{ secrets.DOCKERHUB_USERNAME }}/stageboard-frontend:latest"
          echo "Tag commit   : ${{ github.sha }}"
          echo "Watchtower va détecter la nouvelle image sous ~60 secondes."