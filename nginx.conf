# ============================================================
# [FRONTEND] stageBoard — Configuration Nginx
# Fichier : nginx.conf (à la racine du repo frontend)
# ============================================================

server {
    listen 80 ;
    server_name satageboard.com www.satageboard.com app.satageboard.com;

    location / {
        return 301 https://$host$request_uri;
    }

}

server {
    listen 443 ssl;
    server_name satageboard.com www.satageboard.com app.satageboard.com;

    ssl_certificate /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression Gzip ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ── SPA Routing (React/Vue) ───────────────────────────────
    # Toutes les routes inconnues renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy vers le Backend API ─────────────────────────────
    # Les appels /api/... sont redirigés vers le conteneur backend
location /api/ {
    proxy_pass http://api:5000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 120s;
}

    # ── Cache des assets statiques ────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}