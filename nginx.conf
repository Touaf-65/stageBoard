# ── Rate limiting ─────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name stagebroad.com www.stagebroad.com;

    # Définir les zones de rate limiting (dans le bloc http{})
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=reset_pwd:10m rate=2r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stagebroad.com www.stagebroad.com;

    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    # ── SSL durci ─────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Désactiver pour Forward Secrecy
    ssl_stapling on;          # OCSP Stapling
    ssl_stapling_verify on;


    # ── Headers de sécurité ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self';" always;

    # ── Cacher la version Nginx ───────────────────────────────
    server_tokens off;

    # ── Taille max des requêtes ───────────────────────────────
    client_max_body_size 10M;


    # Dans les locations
    location /api/ { limit_req zone=api_global burst=50 nodelay; limit_conn conn_limit 20; }
    location /api/auth/login { limit_req zone=login burst=3 nodelay; }
    location /api/auth/register { limit_req zone=register burst=2 nodelay; }
    location /api/auth/reset-password { limit_req zone=reset_pwd burst=1 nodelay; }



    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API avec rate limiting ────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://stageboard-api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Cacher les infos du backend
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ── Login avec rate limiting strict ──────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://stageboard-api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}